<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Input - MY Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:       #1a56e8;
            --blue-dark:  #1340c0;
            --blue-light: #e8effe;
            --gray-50:    #f8fafc;
            --gray-100:   #f1f5f9;
            --gray-200:   #e2e8f0;
            --gray-400:   #94a3b8;
            --gray-600:   #475569;
            --gray-800:   #1e293b;
            --radius:     12px;
            --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
            --shadow-md:  0 4px 20px rgba(0,0,0,.10);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--gray-50);
            min-height: 100vh;
            color: var(--gray-800);
            background-image:
                radial-gradient(ellipse 80% 40% at 50% -5%, #d4e3ff 0%, transparent 55%);
        }

        /* ── Navbar ─────────────────────────── */
        .navbar {
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            padding: 0 32px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .brand-icon {
            width: 32px; height: 32px;
            background: var(--blue);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
        }

        .brand-icon svg { width: 18px; height: 18px; fill: #fff; }
        .brand span { color: var(--blue); }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
            padding: 6px 14px;
            border-radius: 7px;
            border: 1.5px solid var(--gray-200);
            transition: all .2s;
        }

        .back-btn:hover {
            background: var(--blue-light);
            border-color: #bfcffa;
            color: var(--blue);
        }

        /* ── Page layout ─────────────────────── */
        .container {
            max-width: 560px;
            margin: 40px auto;
            padding: 0 24px;
        }

        .page-header {
            margin-bottom: 24px;
        }

        .breadcrumb {
            font-size: 12.5px;
            color: var(--gray-400);
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .breadcrumb a {
            color: var(--blue);
            text-decoration: none;
        }

        .breadcrumb a:hover { text-decoration: underline; }

        .page-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--gray-800);
        }

        /* ── Card ────────────────────────────── */
        .card {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            box-shadow: var(--shadow-md);
            padding: 36px;
        }

        /* ── Form elements ───────────────────── */
        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-800);
            margin-bottom: 7px;
        }

        label .required {
            color: #ef4444;
            margin-left: 3px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            color: var(--gray-800);
            background: var(--gray-50);
            transition: border-color .2s, box-shadow .2s;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--blue);
            box-shadow: 0 0 0 3px rgba(26,86,232,.12);
            background: #fff;
        }

        /* ── Radio buttons ───────────────────── */
        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 11px 14px;
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color .2s, background .2s;
        }

        .radio-option:hover {
            border-color: var(--blue);
            background: var(--blue-light);
        }

        .radio-option input[type="radio"] {
            accent-color: var(--blue);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .radio-option input[type="radio"]:checked + .radio-label {
            color: var(--blue);
            font-weight: 600;
        }

        .radio-label {
            font-size: 14px;
            color: var(--gray-800);
            cursor: pointer;
        }

        /* ── Divider ─────────────────────────── */
        .divider {
            border: none;
            border-top: 1px solid var(--gray-100);
            margin: 26px 0;
        }

        /* ── Action buttons ──────────────────── */
        .actions {
            display: flex;
            gap: 12px;
        }

        .btn-submit {
            flex: 1;
            padding: 11px;
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 14.5px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background .2s, transform .1s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
        }

        .btn-submit:hover  { background: var(--blue-dark); }
        .btn-submit:active { transform: scale(.98); }

        .btn-cancel {
            padding: 11px 20px;
            background: transparent;
            color: var(--gray-600);
            border: 1.5px solid var(--gray-200);
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: all .2s;
        }

        .btn-cancel:hover {
            background: var(--gray-100);
            border-color: var(--gray-400);
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
        </div>
        MY <span>Website</span>
    </div>
    <a href="/home" class="back-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
        </svg>
        Kembali
    </a>
</nav>

<!-- Content -->
<div class="container">

    <div class="page-header">
        <div class="breadcrumb">
            <a href="/home">Home</a>
            <span>›</span>
            <span>Input Data Mahasiswa</span>
        </div>
        <h1 class="page-title">Form Input Mahasiswa</h1>
    </div>

    <div class="card">
        <form action="/form" method="post" th:object="${user}">

            <!-- Nama -->
            <div class="form-group">
                <label for="nama">Nama <span class="required">*</span></label>
                <input type="text" id="nama" name="nama" th:field="*{nama}"
                       placeholder="Masukkan nama lengkap" required>
            </div>

            <!-- NIM -->
            <div class="form-group">
                <label for="nim">NIM <span class="required">*</span></label>
                <input type="text" id="nim" name="nim" th:field="*{nim}"
                       placeholder="Masukkan NIM" required>
            </div>

            <!-- Jenis Kelamin -->
            <div class="form-group">
                <label>Jenis Kelamin <span class="required">*</span></label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" th:field="*{jenisKelamin}" value="Laki-laki" required>
                        <span class="radio-label">Laki-laki</span>
                    </label>
                    <label class="radio-option">
                        <input type="radio" th:field="*{jenisKelamin}" value="Perempuan">
                        <span class="radio-label">Perempuan</span>
                    </label>
                </div>
            </div>

            <hr class="divider">

            <div class="actions">
                <a href="/home" class="btn-cancel">Batal</a>
                <button type="submit" class="btn-submit">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                    </svg>
                    Submit
                </button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
