<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - MY Website</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:       #1a56e8;
            --blue-dark:  #1340c0;
            --blue-light: #e8effe;
            --gray-50:    #f8fafc;
            --gray-100:   #f1f5f9;
            --gray-200:   #e2e8f0;
            --gray-400:   #94a3b8;
            --gray-600:   #475569;
            --gray-800:   #1e293b;
            --radius:     12px;
            --shadow-sm:  0 1px 3px rgba(0,0,0,.08);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--gray-50);
            min-height: 100vh;
            color: var(--gray-800);
        }

        /* ── Navbar ─────────────────────────── */
        .navbar {
            background: #fff;
            border-bottom: 1px solid var(--gray-200);
            padding: 0 32px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .brand-icon {
            width: 32px; height: 32px;
            background: var(--blue);
            border-radius: 7px;
            display: flex; align-items: center; justify-content: center;
        }

        .brand-icon svg { width: 18px; height: 18px; fill: #fff; }
        .brand span { color: var(--blue); }

        .logout-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-600);
            padding: 6px 14px;
            border-radius: 7px;
            border: 1.5px solid var(--gray-200);
            transition: all .2s;
        }

        .logout-btn:hover {
            background: #fef2f2;
            border-color: #fecaca;
            color: #ef4444;
        }

        /* ── Page layout ─────────────────────── */
        .container {
            max-width: 860px;
            margin: 36px auto;
            padding: 0 24px;
        }

        /* ── Welcome banner ──────────────────── */
        .welcome-banner {
            background: linear-gradient(135deg, var(--blue) 0%, #3b6ff5 100%);
            border-radius: var(--radius);
            padding: 28px 32px;
            color: #fff;
            margin-bottom: 28px;
            position: relative;
            overflow: hidden;
        }

        .welcome-banner::after {
            content: '';
            position: absolute;
            right: -30px; top: -30px;
            width: 160px; height: 160px;
            background: rgba(255,255,255,.08);
            border-radius: 50%;
        }

        .welcome-banner h2 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .welcome-banner p {
            font-size: 13.5px;
            opacity: .85;
            margin-bottom: 18px;
        }

        .add-btn {
            display: inline-flex;
            align-items: center;
            gap: 7px;
            background: #fff;
            color: var(--blue);
            text-decoration: none;
            padding: 9px 18px;
            border-radius: 8px;
            font-size: 13.5px;
            font-weight: 700;
            transition: opacity .2s;
        }

        .add-btn:hover { opacity: .9; }

        /* ── Table section ───────────────────── */
        .section-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--gray-800);
        }

        .count-badge {
            background: var(--blue-light);
            color: var(--blue);
            font-size: 12px;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 99px;
        }

        .table-card {
            background: #fff;
            border: 1px solid var(--gray-200);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead tr {
            background: var(--blue);
            color: #fff;
        }

        thead th {
            padding: 12px 18px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: .3px;
        }

        tbody tr {
            border-bottom: 1px solid var(--gray-100);
            transition: background .15s;
        }

        tbody tr:last-child { border-bottom: none; }
        tbody tr:hover { background: var(--gray-50); }

        tbody td {
            padding: 12px 18px;
            font-size: 13.5px;
            color: var(--gray-800);
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: var(--gray-400);
            font-size: 13.5px;
        }

        .no-data svg { margin-bottom: 10px; opacity: .4; }

        .gender-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 600;
        }

        .gender-laki {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .gender-perempuan {
            background: #fce7f3;
            color: #be185d;
        }

        /* ── Footer ──────────────────────────── */
        .page-footer {
            text-align: center;
            margin-top: 36px;
            font-size: 12px;
            color: var(--gray-400);
            padding-bottom: 24px;
        }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2a5 5 0 1 0 0 10A5 5 0 0 0 12 2zm0 12c-5.33 0-8 2.67-8 4v2h16v-2c0-1.33-2.67-4-8-4z"/></svg>
        </div>
        MY <span>Website</span>&nbsp;—&nbsp;NIM Anda
    </div>
    <a href="/logout" class="logout-btn">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17 7l-1.41 1.41L18.17 11H8v2h10.17l-2.58 2.58L17 17l5-5-5-5zM4 5h8V3H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h8v-2H4V5z"/>
        </svg>
        Logout
    </a>
</nav>

<!-- Content -->
<div class="container">

    <!-- Welcome Banner -->
    <div class="welcome-banner">
        <h2>Selamat datang di aplikasi!</h2>
        <p>Kelola data mahasiswa dengan mudah. Data bersifat temporary (tidak disimpan di database).</p>
        <a href="/form" class="add-btn">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
            Input Data Mahasiswa
        </a>
    </div>

    <!-- Table -->
    <div class="section-header">
        <span class="section-title">Data Mahasiswa</span>
        <!-- Count badge: jumlah data -->
        <span class="count-badge" th:text="${users != null ? users.size() : 0}">0</span>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th style="width:60px">No</th>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jenis Kelamin</th>
            </tr>
            </thead>
            <tbody>
            <!-- Jika data kosong -->
            <tr th:if="${users == null or users.isEmpty()}">
                <td colspan="4" class="no-data">
                    <div>
                        <svg width="36" height="36" viewBox="0 0 24 24" fill="#94a3b8" display="block" style="margin:0 auto 8px">
                            <path d="M20 6h-2.18c.07-.44.18-.88.18-1.36C18 2.53 15.47 0 12.36 0 10.5 0 8.89.95 7.86 2.38L7 3.5 6.14 2.38C5.11.95 3.5 0 1.64 0H1.5v2h.14C2.86 2 4.06 2.62 4.82 3.64L6 5.17 4.82 6.7C4.06 7.72 2.86 8.34 1.64 8.34H1.5V10.34h.14c1.86 0 3.47-.95 4.5-2.38L7 6.84l.86 1.12C8.89 9.39 10.5 10.34 12.36 10.34c3.11 0 5.64-2.53 5.64-5.64 0-.48-.07-.92-.18-1.36H20v2.66zm-7.64 4c-1.97 0-3.64-1.43-3.64-3.36 0-1.93 1.67-3.36 3.64-3.36 1.97 0 3.64 1.43 3.64 3.36 0 1.93-1.67 3.36-3.64 3.36zM3 13H1v9h22v-9H3zm18 7H3v-5h18v5z"/>
                        </svg>
                        Belum ada data
                    </div>
                </td>
            </tr>

            <!-- Loop data mahasiswa -->
            <tr th:each="user, stat : ${users}">
                <td th:text="${stat.count}">1</td>
                <td th:text="${user.nama}">Nama</td>
                <td th:text="${user.nim}">NIM</td>
                <td>
                        <span class="gender-badge"
                              th:classappend="${user.jenisKelamin == 'Laki-laki'} ? 'gender-laki' : 'gender-perempuan'"
                              th:text="${user.jenisKelamin}">
                            Laki-laki
                        </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="page-footer">MY Website &copy; 2024 &mdash; NIM Anda</div>
</div>

</body>
</html>
